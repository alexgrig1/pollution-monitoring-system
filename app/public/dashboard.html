<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pollution Dashboards</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      margin: 0;
      background: #f3f4f6;
    }

    header {
      padding: 16px 24px;
      background: #111827;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    a {
      color: white;
      text-decoration: none;
      font-weight: 600;
    }

    .content {
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    iframe {
      width: 100%;
      height: calc(100vh - 120px);
      border: 0;
      border-radius: 8px;
      background: white;
    }
  </style>
</head>

<body>
  <header>
    <h2>Pollution Monitoring Dashboards</h2>
    <a href="/">Back to App</a>
  </header>

  <div class="content">
    <div class="card">
      <iframe
        src="http://localhost:3002/public-dashboards/69cedf331d63407b9357480c334ebabe"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
