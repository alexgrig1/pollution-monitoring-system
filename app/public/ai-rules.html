<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AI Rule Generator</title>

  <style>
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      padding: 24px;
      background: #f3f4f6;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    a {
      color: #111827;
      font-weight: 600;
      text-decoration: none;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      padding: 12px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      resize: vertical;
    }

    button {
      padding: 10px 14px;
      font-size: 14px;
      cursor: pointer;
      margin-right: 8px;
      margin-top: 10px;
    }

    pre {
      background: #111827;
      color: #f9fafb;
      padding: 14px;
      border-radius: 8px;
      overflow: auto;
      white-space: pre-wrap;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      background: white;
      margin-top: 12px;
    }

    th, td {
      border: 1px solid #e5e7eb;
      padding: 8px;
      text-align: left;
      font-size: 14px;
      vertical-align: top;
    }

    th {
      background: #f9fafb;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    }

    .ok {
      color: #16a34a;
      font-weight: bold;
    }

    .bad {
      color: #dc2626;
      font-weight: bold;
    }

    .muted {
      color: #6b7280;
    }
  </style>
</head>

<body>
  <header>
    <h1>AI Rule Generator</h1>
    <a href="/">Back to App</a>
  </header>

  <div class="card">
    <h2>Generate DRL Rule</h2>
    <p class="muted">
      Describe the rule in natural language. The generated DRL is validated and saved as DRAFT.
    </p>

    <textarea id="prompt" placeholder="Example: Create a HIGH alert when hourly PM2.5 average is over 60 in morning shift"></textarea>

    <div>
      <button id="generateBtn">Generate Rule</button>
      <button id="loadBtn">Load Generated Rules</button>
    </div>
  </div>

  <div class="card">
    <h2>Generated Rule Preview</h2>
    <div id="validation"></div>
    <pre id="generatedDrl">(Generated DRL will appear here)</pre>
  </div>

  <div class="card">
    <h2>Saved Generated Rules</h2>
    <div id="rulesContainer">No rules loaded</div>
  </div>

  <script>
    const promptEl = document.getElementById('prompt');
    const generatedDrlEl = document.getElementById('generatedDrl');
    const validationEl = document.getElementById('validation');
    const rulesContainer = document.getElementById('rulesContainer');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    async function generateRule() {
      const prompt = promptEl.value.trim();

      if (!prompt) {
        alert('Please enter a rule description');
        return;
      }

      generatedDrlEl.textContent = 'Generating...';
      validationEl.innerHTML = '';

      try {
        const response = await fetch('/api/ai-rules/generate', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ prompt }),
        });

        const data = await response.json();

        generatedDrlEl.textContent = data.generatedDrl || JSON.stringify(data, null, 2);

        if (data.validation) {
          validationEl.innerHTML = data.validation.ok
            ? '<p class="ok">VALID</p>'
            : `<p class="bad">INVALID</p><pre>${escapeHtml(JSON.stringify(data.validation.errors, null, 2))}</pre>`;
        }

        await loadRules();
      } catch (e) {
        generatedDrlEl.textContent = 'Error: ' + e;
      }
    }

    async function loadRules() {
      try {
        const response = await fetch('/api/ai-rules?limit=20');
        const data = await response.json();

        if (!data.ok || !data.rules?.length) {
          rulesContainer.innerHTML = '<p>No generated rules found</p>';
          return;
        }

        rulesContainer.innerHTML = `
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Prompt</th>
                <th>Validation</th>
                <th>Status</th>
                <th>Created</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              ${data.rules.map(rule => `
                <tr>
                  <td>${escapeHtml(rule.id)}</td>
                  <td>${escapeHtml(rule.user_prompt)}</td>
                  <td>${escapeHtml(rule.validation_status)}</td>
                  <td>${escapeHtml(rule.status)}</td>
                  <td>${escapeHtml(rule.created_at)}</td>
                  <td>
                    <button onclick="viewRule(${rule.id})">View</button>
                    <button onclick="setStatus(${rule.id}, 'APPROVED')">Approve</button>
                    <button onclick="setStatus(${rule.id}, 'REJECTED')">Reject</button>
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `;
      } catch (e) {
        rulesContainer.innerHTML = `<p>Error: ${escapeHtml(e)}</p>`;
      }
    }

    async function viewRule(id) {
      const response = await fetch('/api/ai-rules/' + id);
      const data = await response.json();

      if (!data.ok) {
        generatedDrlEl.textContent = JSON.stringify(data, null, 2);
        return;
      }

      promptEl.value = data.rule.user_prompt;
      generatedDrlEl.textContent = data.rule.generated_drl;

      const errors = JSON.parse(data.rule.validation_errors || '[]');
      validationEl.innerHTML = data.rule.validation_status === 'VALID'
        ? '<p class="ok">VALID</p>'
        : `<p class="bad">INVALID</p><pre>${escapeHtml(JSON.stringify(errors, null, 2))}</pre>`;
    }

    async function setStatus(id, status) {
      await fetch('/api/ai-rules/' + id + '/status', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ status }),
      });

      await loadRules();
    }

    document.getElementById('generateBtn').addEventListener('click', generateRule);
    document.getElementById('loadBtn').addEventListener('click', loadRules);

    loadRules();
  </script>
</body>
</html>
