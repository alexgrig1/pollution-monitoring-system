services:
  app:
    build:
      context: ../app
    container_name: pollution-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - BC_REPO_PATH=/workspace/pollution-rules
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=qwen2.5-coder:1.5b
    volumes:
      - ../app/data:/usr/src/app/data
      - ../pollution-rules:/workspace/pollution-rules

  governance-ui:
    build:
      context: ../governance-ui
    container_name: pollution-governance-ui
    ports:
      - "3001:5173"
    depends_on:
      - app

  git-rule-runner:
    build:
      context: ../git-rule-runner
    container_name: pollution-git-rule-runner
    ports:
      - "3020:3020"
    environment:
      - PORT=3020
      - BC_REPO_PATH=/workspace/pollution-rules
    volumes:
      - ../pollution-rules:/workspace/pollution-rules

  ollama:
    image: ollama/ollama:latest
    container_name: pollution-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    gpus: all

  grafana:
    image: grafana/grafana:latest
    container_name: pollution-grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
      - GF_SECURITY_ALLOW_EMBEDDING=true
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    volumes:
      - grafana-data:/var/lib/grafana
      - ../app/data:/app/data
    depends_on:
      - app

volumes:
  grafana-data:
  ollama-data: